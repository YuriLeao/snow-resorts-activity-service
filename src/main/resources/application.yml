spring:
  application:
    name: activity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/snow_resorts?currentSchema=activity}
    username: ${DB_USER:snow}
    password: ${DB_PASSWORD:snow}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: activity
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: activity
    default-schema: activity
    create-schemas: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

server:
  port: ${SERVER_PORT:8085}
  forward-headers-strategy: framework

snow:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}
  internal-api:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret}
    header: X-Internal-Secret
  security:
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGIN:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.snowresorts.activity: INFO
