# Local dev profile ($0). Connects to the Docker Compose Postgres started by `make dev`.
spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/snow_resorts?currentSchema=activity
    username: snow
    password: snow
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

logging:
  level:
    com.snowresorts.activity: DEBUG
